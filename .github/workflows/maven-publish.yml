# 此工作流将在代码推送至主分支时，自动使用Maven构建项目，
# 并创建GitHub Release（预发布版本）及发布包到GitHub Packages
# 关于Maven的更多信息：https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: 自动构建与发布

on:
  push:
    branches: [ main, master ] # 在推送到主分支时触发
  # 可选：也可以通过打标签的方式触发正式发布
  # push:
  #   tags:
  #     - 'v*'

jobs:
  # 1. 构建、测试并打包
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取所有历史用于版本生成

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: 缓存 Maven 依赖
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: 使用 Maven 构建（包含测试）
      run: mvn -B clean verify --file pom.xml

    - name: 上传构建产物（JAR）
      uses: actions/upload-artifact@v4
      with:
        name: Modifiedchat-jar
        path: target/*.jar
        retention-days: 5