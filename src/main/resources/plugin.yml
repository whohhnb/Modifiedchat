name: modifiedchat
version: '${project.version}'
main: cn.whohh.modifiedchat.Modifiedchat
api-version: 1.19
prefix: modifiedchat
load: STARTUP
soft-depend: [PlaceholderAPI]
authors: [whohh]
description: 一个可以修改聊天格式的一个Minecraft Server插件
website: https://whohh.cn
folia-supported: true

permissions:
  modifiedchat.reload:
    description: 允许重载插件配置
    default: op
  modifiedchat.whisper:
    description: 允许发送私聊消息
    default: true

commands:
  modifiedwhisper:
    description: 发送私聊消息给其他玩家
    usage: /modifiedwhisper <玩家> <信息>
    permission: modifiedchat.whisper
  modifiedtell:
    description: 发送私聊消息给其他玩家
    usage: /modifiedtell <玩家> <信息>
    permission: modifiedchat.whisper
  mt:
    description: 发送私聊消息给其他玩家
    usage: /mt <玩家> <信息>
    permission: modifiedchat.whisper
  mtreload:
    description: 重载插件
    usage: /mtreload
    permission: modifiedchat.reload